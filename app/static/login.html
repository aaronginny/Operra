<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhantomPilot - Smart Task Management</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0f1a;color:#fff;min-height:100vh;display:flex;overflow:hidden}

/* ── Animations ───────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade-up{animation:fadeUp .7s ease both}
.fade-up-d1{animation:fadeUp .7s ease .15s both}
.fade-up-d2{animation:fadeUp .7s ease .3s both}
.fade-up-d3{animation:fadeUp .7s ease .45s both}
.fade-in{animation:fadeIn 1s ease .3s both}

/* ── Left Panel (Form) ────────────────────────────────────── */
.left{flex:1;display:flex;flex-direction:column;justify-content:center;padding:60px 56px;max-width:520px;position:relative;z-index:2}
.logo{font-size:1.15rem;font-weight:700;color:#fff;margin-bottom:56px;letter-spacing:-.3px}
.logo span{color:#fff}
.welcome{font-size:1.8rem;font-weight:700;line-height:1.2;margin-bottom:8px}
.welcome-sub{color:#64748b;font-size:.9rem;margin-bottom:36px}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:28px;border-bottom:1px solid #1e293b}
.tab{flex:1;text-align:center;padding:12px 0;cursor:pointer;color:#64748b;font-size:.85rem;font-weight:500;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:#94a3b8}
.tab.active{color:#fff;border-bottom-color:#fff;font-weight:600}

/* Form */
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:.78rem;color:#94a3b8;margin-bottom:6px;font-weight:500}
.form-group label .hint{color:#475569;font-weight:400}
.form-group input{width:100%;padding:12px 16px;background:#0f172a;border:1px solid #1e293b;color:#fff;border-radius:8px;font-size:.88rem;font-family:inherit;transition:border-color .2s;outline:none}
.form-group input::placeholder{color:#334155}
.form-group input:focus{border-color:rgba(255,255,255,.3)}
.submit-btn{width:100%;padding:14px;background:#ffffff;color:#0a0f1a;border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px;font-family:inherit}
.submit-btn:hover{background:rgba(255,255,255,.85);transform:translateY(-1px);box-shadow:0 6px 24px rgba(255,255,255,.2)}
.error{color:#f87171;text-align:center;margin-top:14px;font-size:.82rem;min-height:20px}
.hidden{display:none}

/* ── Right Panel (Mockup) ─────────────────────────────────── */
.right{flex:1.2;background:linear-gradient(135deg,#0f172a 0%,#131c2e 50%,#0f172a 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.right::before{content:'';position:absolute;top:-20%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(245,158,11,.06) 0%,transparent 70%);pointer-events:none}
.right::after{content:'';position:absolute;bottom:-20%;left:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(59,130,246,.04) 0%,transparent 70%);pointer-events:none}

.mock-dashboard{width:80%;max-width:480px;position:relative;z-index:1}
.mock-frame{background:#0b1120;border:1px solid rgba(255,255,255,.06);border-radius:12px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.5)}
.mock-topbar{height:32px;background:#080e1a;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;padding:0 12px;gap:6px}
.mock-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.06)}
.mock-content{padding:20px}
.mock-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mock-title{font-size:.78rem;font-weight:700;color:#e2e8f0}
.mock-badge{font-size:.6rem;background:rgba(255,255,255,.08);color:#fff;padding:3px 10px;border-radius:100px;font-weight:600}
.mock-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.mock-stat{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:8px;padding:12px 10px;text-align:center}
.mock-stat-num{font-size:1.2rem;font-weight:700;color:#fff}
.mock-stat-label{font-size:.6rem;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.mock-tasks{display:flex;flex-direction:column;gap:8px}
.mock-task{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.03);border-radius:8px}
.mock-task-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mock-task-text{font-size:.72rem;color:#94a3b8;flex:1}
.mock-task-status{font-size:.6rem;padding:2px 8px;border-radius:4px;font-weight:600}

/* ── Responsive ───────────────────────────────────────────── */
@media(max-width:900px){
  body{flex-direction:column}
  .left{max-width:100%;padding:40px 28px}
  .right{display:none}
}
</style>
</head>
<body>

<!-- ── Left: Form ──────────────────────────────────────────── -->
<div class="left">
  <div class="logo fade-up">Phantom<span>Pilot</span></div>
  <h1 class="welcome fade-up-d1">Welcome back</h1>
  <p class="welcome-sub fade-up-d2">Sign in to manage your team, or create a new account.</p>

  <div class="tabs fade-up-d2">
    <div class="tab" id="tabLogin" onclick="switchTab('login')">Login</div>
    <div class="tab active" id="tabSignup" onclick="switchTab('signup')">Sign Up</div>
  </div>

  <form id="loginForm" class="hidden fade-up-d3" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@company.com" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password" required />
    </div>
    <button type="submit" class="submit-btn">Login</button>
    <div id="loginError" class="error"></div>
  </form>

  <form id="signupForm" class="fade-up-d3" onsubmit="handleSignup(event)">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="signupName" placeholder="Aaron Panikulam" required />
    </div>
    <div class="form-group">
      <label>Company Name</label>
      <input type="text" id="signupCompany" placeholder="Your company" required />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signupEmail" placeholder="you@company.com" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="Create a password" required />
    </div>
    <div class="form-group">
      <label>Your WhatsApp Number <span class="hint">(for CEO commands)</span></label>
      <input type="tel" id="signupWhatsapp" placeholder="+91XXXXXXXXXX" />
    </div>
    <button type="submit" class="submit-btn">Create Company Account</button>
    <div id="signupError" class="error"></div>
  </form>
</div>

<!-- ── Right: Dashboard Mockup ─────────────────────────────── -->
<div class="right fade-in">
  <div class="mock-dashboard">
    <div class="mock-frame">
      <div class="mock-topbar">
        <div class="mock-dot"></div>
        <div class="mock-dot"></div>
        <div class="mock-dot"></div>
      </div>
      <div class="mock-content">
        <div class="mock-header">
          <div class="mock-title">PhantomPilot Dashboard</div>
          <div class="mock-badge">LIVE</div>
        </div>
        <div class="mock-stats">
          <div class="mock-stat">
            <div class="mock-stat-num">12</div>
            <div class="mock-stat-label">Active</div>
          </div>
          <div class="mock-stat">
            <div class="mock-stat-num">47</div>
            <div class="mock-stat-label">Done</div>
          </div>
          <div class="mock-stat">
            <div class="mock-stat-num">98%</div>
            <div class="mock-stat-label">On-Time</div>
          </div>
        </div>
        <div class="mock-tasks">
          <div class="mock-task">
            <div class="mock-task-dot" style="background:#4ade80"></div>
            <div class="mock-task-text">Fix plumbing at Site 3</div>
            <div class="mock-task-status" style="background:rgba(74,222,128,.12);color:#4ade80">Done</div>
          </div>
          <div class="mock-task">
            <div class="mock-task-dot" style="background:#74b9ff"></div>
            <div class="mock-task-text">Paint walls at Prestige Tower</div>
            <div class="mock-task-status" style="background:rgba(116,185,255,.12);color:#74b9ff">In Progress</div>
          </div>
          <div class="mock-task">
            <div class="mock-task-dot" style="background:#64748b"></div>
            <div class="mock-task-text">Inspect wiring at Block C</div>
            <div class="mock-task-status" style="background:rgba(100,116,139,.12);color:#94a3b8">Pending</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var API = window.location.origin;

if (localStorage.getItem("company_id")) {
  window.location.href = "/static/dashboard/index.html";
}

function switchTab(tab) {
  document.getElementById("tabLogin").classList.toggle("active", tab === "login");
  document.getElementById("tabSignup").classList.toggle("active", tab === "signup");
  document.getElementById("loginForm").classList.toggle("hidden", tab !== "login");
  document.getElementById("signupForm").classList.toggle("hidden", tab !== "signup");
  document.getElementById("loginError").innerText = "";
  document.getElementById("signupError").innerText = "";
  var w = document.querySelector(".welcome");
  w.textContent = tab === "login" ? "Welcome back" : "Get started";
}

function handleLogin(e) {
  e.preventDefault();
  var btn = e.target.querySelector("button");
  var err = document.getElementById("loginError");
  btn.textContent = "Loading...";

  fetch("/auth/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      email: document.getElementById("loginEmail").value,
      password: document.getElementById("loginPassword").value
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success) {
      localStorage.setItem("company_id", data.company_id);
      localStorage.setItem("token", data.access_token);
      window.location.href = "/static/dashboard/index.html";
    } else {
      err.innerText = data.error || "Login failed";
      btn.textContent = "Login";
    }
  })
  .catch(function() {
    err.innerText = "An error occurred";
    btn.textContent = "Login";
  });
}

function handleSignup(e) {
  e.preventDefault();
  var btn = e.target.querySelector("button");
  var err = document.getElementById("signupError");
  btn.textContent = "Loading...";

  var waNum = document.getElementById("signupWhatsapp").value.trim();
  fetch("/auth/signup", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: document.getElementById("signupName").value,
      company_name: document.getElementById("signupCompany").value,
      email: document.getElementById("signupEmail").value,
      password: document.getElementById("signupPassword").value,
      whatsapp_number: waNum || null
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success) {
      localStorage.setItem("company_id", data.company_id);
      localStorage.setItem("token", data.access_token);
      window.location.href = "/static/dashboard/index.html";
    } else {
      err.innerText = data.error || "Signup failed";
      btn.textContent = "Create Company Account";
    }
  })
  .catch(function() {
    err.innerText = "An error occurred";
    btn.textContent = "Create Company Account";
  });
}
</script>
</body>
</html>
